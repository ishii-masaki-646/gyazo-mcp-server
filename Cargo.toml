[package]
name = "gyazo-mcp-server"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
rmcp = { version = "0.8.0", features = ["server", "transport-io"] }
schemars = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
