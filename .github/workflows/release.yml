name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # タグと Cargo.toml の version が一致しているかを最初に検証する。
  # ここで失敗させることで、後続の build / release / docker / homebrew / winget /
  # crates-io が一切走らないようにし、配信チャネル間の不整合や
  # 「タグだけ古い・新しい」状態の publish を防ぐ。
  verify:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compare versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Tag and Cargo.toml are both $TAG_VERSION"

  build:
    name: Build (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux aarch64 のクロスコンパイルに必要
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gyazo-mcp-server-${{ matrix.target }}.tar.gz gyazo-mcp-server
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../gyazo-mcp-server-${{ matrix.target }}.zip gyazo-mcp-server.exe
          cd ../../..

      - uses: actions/upload-artifact@v7
        with:
          name: gyazo-mcp-server-${{ matrix.target }}
          path: gyazo-mcp-server-${{ matrix.target }}.*

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      # CHANGELOG.md から該当バージョンのセクションを抜き出す
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## ${VERSION} /{found=1; next} /^## /{if(found) exit} found" CHANGELOG.md)
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/*

  crates-io:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  docker:
    name: Docker Image
    needs: [release, crates-io, homebrew, winget]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ishiimasaki646/gyazo-mcp-server:${{ steps.version.outputs.version }}
            ishiimasaki646/gyazo-mcp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            --pattern '*.tar.gz' \
            --dir assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute checksums
        id: sha
        run: |
          echo "aarch64_apple=$(sha256sum assets/gyazo-mcp-server-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64_apple=$(sha256sum assets/gyazo-mcp-server-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "aarch64_linux=$(sha256sum assets/gyazo-mcp-server-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(sha256sum assets/gyazo-mcp-server-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: ishii-masaki-646/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > Formula/gyazo-mcp-server.rb << 'FORMULA'
          class GyazoMcpServer < Formula
            desc "Local MCP server for Gyazo with HTTP and stdio transport support"
            homepage "https://github.com/ishii-masaki-646/gyazo-mcp-server"
            version "VERSION_PLACEHOLDER"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ishii-masaki-646/gyazo-mcp-server/releases/download/vVERSION_PLACEHOLDER/gyazo-mcp-server-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_APPLE"
              else
                url "https://github.com/ishii-masaki-646/gyazo-mcp-server/releases/download/vVERSION_PLACEHOLDER/gyazo-mcp-server-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_APPLE"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/ishii-masaki-646/gyazo-mcp-server/releases/download/vVERSION_PLACEHOLDER/gyazo-mcp-server-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_LINUX"
              else
                url "https://github.com/ishii-masaki-646/gyazo-mcp-server/releases/download/vVERSION_PLACEHOLDER/gyazo-mcp-server-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_LINUX"
              end
            end

            def install
              bin.install "gyazo-mcp-server"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/gyazo-mcp-server --version")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/gyazo-mcp-server.rb
          sed -i "s/SHA_AARCH64_APPLE/${{ steps.sha.outputs.aarch64_apple }}/g" Formula/gyazo-mcp-server.rb
          sed -i "s/SHA_X86_64_APPLE/${{ steps.sha.outputs.x86_64_apple }}/g" Formula/gyazo-mcp-server.rb
          sed -i "s/SHA_AARCH64_LINUX/${{ steps.sha.outputs.aarch64_linux }}/g" Formula/gyazo-mcp-server.rb
          sed -i "s/SHA_X86_64_LINUX/${{ steps.sha.outputs.x86_64_linux }}/g" Formula/gyazo-mcp-server.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gyazo-mcp-server.rb
          git commit -m "Update gyazo-mcp-server to ${{ steps.version.outputs.version }}"
          git push

  winget:
    name: Update winget Package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Submit package update to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: ishiimasaki646.gyazo-mcp-server
          installers-regex: 'gyazo-mcp-server-x86_64-pc-windows-msvc\.zip$'
          fork-user: ishii-masaki-646
          token: ${{ secrets.WINGET_PAT }}
